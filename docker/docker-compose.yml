

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: voiceops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "2181:2181"
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: voiceops-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: voiceops-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic voiceops.calls \
          --partitions 6 \
          --replication-factor 1 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic voiceops.dlq \
          --partitions 1 \
          --replication-factor 1 \
          --config retention.ms=2592000000

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic voiceops.backfill \
          --partitions 6 \
          --replication-factor 1 \
          --config retention.ms=604800000

        echo "Topics created:"
        kafka-topics --bootstrap-server kafka:29092 --list

  postgres:
    image: postgres:16-alpine
    container_name: voiceops-postgres
    environment:
      POSTGRES_DB: voiceops
      POSTGRES_USER: voiceops
      POSTGRES_PASSWORD: voiceops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: pg_isready -U voiceops
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
